<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spine Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: transparent; }
  #scaler { transform-origin: center center; }
  #root { width: 402px; height: 874px; position: relative; }
  @keyframes spDot {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-4px); opacity: 1; }
  }
  @keyframes onbIn {
    from { transform: translateY(12px); }
    to { transform: translateY(0); }
  }
  @keyframes onbSpin { to { transform: rotate(360deg); } }
  @keyframes onbPop {
    from { transform: scale(0.82); }
    to { transform: scale(1); }
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="stage"><div id="scaler"><div id="root"></div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data + tokens (plain JS) -->
<script src="spine/theme.js"></script>
<script src="spine/data.js"></script>

<!-- starters + app (babel) -->
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="spine/base.jsx"></script>
<script type="text/babel" src="spine/icons.jsx"></script>
<script type="text/babel" src="spine/ui.jsx"></script>
<script type="text/babel" src="spine/screens-a.jsx"></script>
<script type="text/babel" src="spine/screens-b.jsx"></script>
<script type="text/babel" src="spine/screens-onboard.jsx"></script>
<script type="text/babel" src="spine/app.jsx"></script>
<script type="text/babel">
  const { SpineApp, SPINE_THEMES, SPINE_ACCENTS } = window;
  function Root() { return <SpineApp baseTheme={SPINE_THEMES.aurora} accent={SPINE_ACCENTS.Cyan.dark} scoreOverride={89} />; }
  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  function fit(){ var s = Math.min(window.innerWidth/402, window.innerHeight/874); document.getElementById("scaler").style.transform = "scale(" + s + ")"; }
  window.addEventListener("resize", fit); fit(); setTimeout(fit, 300);
</script>
</body>
</html>
