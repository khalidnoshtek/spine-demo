<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=390, initial-scale=1, viewport-fit=cover" />
    <title>Nest</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      :root { --a: #34d399; }
      html, body { width: 390px; height: 844px; overflow: hidden; }
      body {
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        background: radial-gradient(120% 50% at 50% -5%, rgba(52,211,153,.18), transparent 60%), #06080a;
        color: #e9f4ee; padding: 56px 22px 24px; -webkit-font-smoothing: antialiased; user-select: none;
      }
      .top { display: flex; justify-content: space-between; align-items: flex-start; }
      .top h1 { font-size: 22px; font-weight: 720; }
      .top .w { text-align: right; font-size: 13px; color: #748a7e; }
      .top .w b { display: block; font-size: 26px; color: #fff; font-weight: 680; }
      .hero { margin: 18px 0; border-radius: 22px; padding: 18px 20px; position: relative; overflow: hidden;
        background: linear-gradient(120deg, #0f1a16, #0c1411); border: 1px solid #18241d; }
      .hero .glow { position: absolute; right: -30px; top: -30px; width: 140px; height: 140px; border-radius: 50%;
        background: radial-gradient(circle, rgba(251,191,36,.5), transparent 65%); filter: blur(6px); transition: opacity .5s; }
      .hero .lbl { font-size: 12px; color: #748a7e; text-transform: uppercase; letter-spacing: .1em; }
      .hero .deg { font-size: 40px; font-weight: 740; margin-top: 4px; }
      .hero .set { font-size: 13px; color: #9fb3a8; margin-top: 2px; }
      .hero .ctrls { position: absolute; right: 18px; bottom: 18px; display: flex; gap: 10px; }
      .hero .ctrls button { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #24332b; background: #0c1511; color: #fff; font-size: 20px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .dev { background: #0b0f0d; border: 1px solid #161e1a; border-radius: 18px; padding: 15px; cursor: pointer; transition: border .2s, background .2s; }
      .dev.on { border-color: rgba(52,211,153,.4); background: linear-gradient(135deg, rgba(52,211,153,.1), rgba(52,211,153,.02)); }
      .dev .row { display: flex; justify-content: space-between; align-items: center; }
      .dev .ic { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; font-size: 20px; background: #121916; }
      .dev.on .ic { background: rgba(52,211,153,.18); }
      .sw { width: 42px; height: 25px; border-radius: 99px; background: #1c2620; position: relative; transition: background .2s; }
      .sw::after { content: ''; position: absolute; top: 3px; left: 3px; width: 19px; height: 19px; border-radius: 50%; background: #5b6c63; transition: transform .2s, background .2s; }
      .dev.on .sw { background: var(--a); } .dev.on .sw::after { transform: translateX(17px); background: #04140d; }
      .dev b { display: block; font-size: 14px; margin-top: 13px; }
      .dev span { font-size: 12px; color: #6c8278; }
      .scene { margin-top: 14px; display: flex; gap: 9px; overflow: hidden; }
      .scene .c { flex: 1; text-align: center; font-size: 12px; color: #9fb3a8; background: #0b0f0d; border: 1px solid #161e1a; border-radius: 14px; padding: 11px 6px; }
      .scene .c .e { font-size: 19px; display: block; margin-bottom: 5px; }
    </style>
  </head>
  <body>
    <div class="top">
      <div><h1>Good evening</h1><div style="color:#748a7e;font-size:13px;margin-top:3px">4 of 9 devices active</div></div>
      <div class="w">Outside<b>64°</b>Clear</div>
    </div>

    <div class="hero">
      <div class="glow" id="glow"></div>
      <div class="lbl">Living room</div>
      <div class="deg" id="deg">71°</div>
      <div class="set">Heat to 72° · Auto</div>
      <div class="ctrls"><button id="dn">−</button><button id="up">+</button></div>
    </div>

    <div class="grid">
      <div class="dev on" data-d><div class="row"><div class="ic">💡</div><div class="sw"></div></div><b>Lamps</b><span>3 lights · 80%</span></div>
      <div class="dev on" data-d><div class="row"><div class="ic">🔒</div><div class="sw"></div></div><b>Front Door</b><span>Locked</span></div>
      <div class="dev" data-d><div class="row"><div class="ic">📺</div><div class="sw"></div></div><b>Living TV</b><span>Off</span></div>
      <div class="dev" data-d><div class="row"><div class="ic">🎵</div><div class="sw"></div></div><b>Speakers</b><span>Off</span></div>
    </div>

    <div class="scene">
      <div class="c"><span class="e">🌅</span>Morning</div>
      <div class="c"><span class="e">🎬</span>Movie</div>
      <div class="c"><span class="e">🌙</span>Sleep</div>
      <div class="c"><span class="e">🏠</span>Away</div>
    </div>

    <script>
      document.querySelectorAll('[data-d]').forEach(d => d.addEventListener('click', () => d.classList.toggle('on')))
      // Thermostat
      let t = 71
      const deg = document.getElementById('deg'), glow = document.getElementById('glow')
      const render = () => { deg.textContent = t + '°'; glow.style.opacity = (t - 64) / 14 }
      document.getElementById('up').onclick = () => { if (t < 78) t++; render() }
      document.getElementById('dn').onclick = () => { if (t > 60) t--; render() }
      render()
    </script>
  </body>
</html>
