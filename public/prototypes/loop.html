<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=390, initial-scale=1, viewport-fit=cover" />
    <title>Loop</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      :root { --a: #f472b6; }
      html, body { width: 390px; height: 844px; overflow: hidden; }
      body {
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        background: radial-gradient(130% 60% at 50% 110%, rgba(244,114,182,.25), transparent 55%), #0a070b;
        color: #f6eef3; padding: 56px 24px 24px; -webkit-font-smoothing: antialiased; user-select: none;
      }
      .nav { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #8a7f87; }
      .nav b { color: #fff; }
      .art {
        width: 100%; aspect-ratio: 1; border-radius: 26px; margin: 24px 0; position: relative; overflow: hidden;
        background: linear-gradient(135deg, #f472b6, #a855f7 55%, #6366f1); box-shadow: 0 30px 60px -22px rgba(244,114,182,.6);
      }
      .art::before { content: ''; position: absolute; inset: 0; background:
        radial-gradient(50% 40% at 30% 25%, rgba(255,255,255,.4), transparent 60%),
        radial-gradient(40% 40% at 80% 80%, rgba(99,102,241,.6), transparent 60%); mix-blend-mode: screen; }
      .art .eq { position: absolute; bottom: 0; left: 0; right: 0; height: 46%; display: flex; align-items: flex-end; gap: 4px; padding: 0 14px 16px; }
      .art .eq i { flex: 1; background: rgba(255,255,255,.55); border-radius: 4px; height: 20%; }
      .title { font-size: 23px; font-weight: 730; letter-spacing: -.01em; }
      .artist { color: #a99aa3; font-size: 14px; margin-top: 4px; }
      .scrub { height: 5px; border-radius: 99px; background: #241c22; margin: 22px 0 8px; overflow: hidden; }
      .scrub i { display: block; height: 100%; width: 38%; background: linear-gradient(90deg, var(--a), #a855f7); }
      .time { display: flex; justify-content: space-between; font-size: 11.5px; color: #8a7f87; font-variant-numeric: tabular-nums; }
      .ctrl { display: flex; justify-content: center; align-items: center; gap: 30px; margin: 22px 0 10px; }
      .ctrl button { background: 0; border: 0; color: #fff; font-size: 26px; }
      .play { width: 70px; height: 70px; border-radius: 50%; background: #fff; color: #0a070b !important; font-size: 26px !important; display: grid; place-items: center; box-shadow: 0 10px 30px -8px rgba(244,114,182,.8); }
      .ctx { margin-top: 16px; background: linear-gradient(120deg, rgba(244,114,182,.14), rgba(168,85,247,.08)); border: 1px solid rgba(244,114,182,.25); border-radius: 18px; padding: 14px 16px; display: flex; gap: 11px; align-items: center; }
      .ctx .s { font-size: 20px; } .ctx p { font-size: 12.5px; color: #cbc0c7; line-height: 1.4; } .ctx p b { color: #fff; }
    </style>
  </head>
  <body>
    <div class="nav"><span>◀</span><span>NOW PLAYING · <b>Focus Flow</b></span><span>≡</span></div>

    <div class="art"><div class="eq" id="eq"></div></div>

    <div class="title">Midnight Drive</div>
    <div class="artist">Parcels · Day/Night</div>

    <div class="scrub"><i id="bar"></i></div>
    <div class="time"><span id="cur">1:24</span><span>−2:18</span></div>

    <div class="ctrl">
      <button>⤺</button>
      <button>⏮</button>
      <button class="play" id="play">⏸</button>
      <button>⏭</button>
      <button>⤻</button>
    </div>

    <div class="ctx"><div class="s">✦</div><p><b>Loop sensed</b> you're winding down — queuing softer tempos for the next hour.</p></div>

    <script>
      // Equalizer that actually dances.
      const eq = document.getElementById('eq')
      const N = 28
      for (let i = 0; i < N; i++) eq.appendChild(document.createElement('i'))
      const bars = [...eq.children]
      let on = true
      function frame() {
        if (on) bars.forEach((b, i) => { b.style.height = (15 + Math.abs(Math.sin(Date.now()/240 + i*0.5)) * 70 * (0.5 + Math.random()*0.5)).toFixed(0) + '%' })
        requestAnimationFrame(frame)
      }
      frame()
      // Scrubber creep
      let p = 38, cur = 84
      setInterval(() => { p = (p + 0.4) % 100; document.getElementById('bar').style.width = p + '%'; cur++; const m = Math.floor(cur/60), s = cur%60; document.getElementById('cur').textContent = m + ':' + String(s).padStart(2,'0') }, 700)
      document.getElementById('play').onclick = function () { on = !on; this.textContent = on ? '⏸' : '▶' }
    </script>
  </body>
</html>
