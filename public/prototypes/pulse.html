<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=390, initial-scale=1, viewport-fit=cover" />
    <title>Pulse</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      :root { --a: #22d3ee; }
      html, body { width: 390px; height: 844px; overflow: hidden; }
      body {
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        background: radial-gradient(120% 55% at 50% -5%, rgba(34,211,238,.22), transparent 60%), #06080b;
        color: #eaf2f4; padding: 56px 22px 24px; -webkit-font-smoothing: antialiased; user-select: none;
      }
      h1 { font-size: 22px; font-weight: 700; letter-spacing: -.01em; }
      .sub { color: #6f8088; font-size: 13px; margin-top: 3px; }
      .ring-wrap { display: grid; place-items: center; margin: 18px 0 8px; }
      svg { transform: rotate(-90deg); }
      .ring-bg { stroke: #15191f; }
      .score { position: absolute; text-align: center; }
      .score b { font-size: 46px; font-weight: 760; letter-spacing: -.03em; }
      .score span { display: block; font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--a); margin-top: 2px; }
      .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 6px; }
      .stat { background: #0d1117; border: 1px solid #161b22; border-radius: 16px; padding: 13px 12px; }
      .stat .k { font-size: 11px; color: #6f8088; text-transform: uppercase; letter-spacing: .08em; }
      .stat .v { font-size: 19px; font-weight: 680; margin-top: 5px; font-variant-numeric: tabular-nums; }
      .stat .v small { font-size: 12px; color: #6f8088; font-weight: 500; }
      .card { margin-top: 16px; background: linear-gradient(120deg, rgba(34,211,238,.14), rgba(34,211,238,.04));
        border: 1px solid rgba(34,211,238,.25); border-radius: 20px; padding: 16px 17px; }
      .card .h { display: flex; justify-content: space-between; align-items: center; }
      .card .h b { font-size: 14.5px; } .card .h .tag { font-size: 11px; color: var(--a); }
      .bars { display: flex; align-items: flex-end; gap: 6px; height: 56px; margin-top: 14px; }
      .bars i { flex: 1; border-radius: 6px 6px 2px 2px; background: linear-gradient(180deg, var(--a), #0e7490); opacity: .85; }
      .plan { margin-top: 16px; display: flex; align-items: center; gap: 13px; background: #0d1117; border: 1px solid #161b22; border-radius: 18px; padding: 14px 15px; }
      .plan .ic { width: 46px; height: 46px; border-radius: 14px; background: rgba(34,211,238,.15); display: grid; place-items: center; font-size: 22px; }
      .plan b { font-size: 14.5px; } .plan p { font-size: 12px; color: #6f8088; margin-top: 2px; }
      .go { margin-left: auto; background: var(--a); color: #04181c; font-weight: 680; font-size: 13px; padding: 9px 15px; border-radius: 99px; border: 0; }
    </style>
  </head>
  <body>
    <h1>Today</h1>
    <div class="sub">Friday, June 20 · Fully recovered</div>

    <div class="ring-wrap" style="position:relative">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="86" fill="none" stroke-width="14" />
        <circle cx="100" cy="100" r="86" fill="none" stroke="url(#g)" stroke-width="14" stroke-linecap="round"
          stroke-dasharray="540" stroke-dashoffset="540" id="arc" />
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs>
      </svg>
      <div class="score"><b id="num">0</b><span>Recovery</span></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="k">HRV</div><div class="v" id="hrv">68<small> ms</small></div></div>
      <div class="stat"><div class="k">Resting</div><div class="v">51<small> bpm</small></div></div>
      <div class="stat"><div class="k">Sleep</div><div class="v">7:42</div></div>
    </div>

    <div class="card">
      <div class="h"><b>Strain · last 7 days</b><span class="tag">Balanced</span></div>
      <div class="bars" id="bars"></div>
    </div>

    <div class="plan">
      <div class="ic">🏃</div>
      <div><b>Zone 2 · 45 min</b><p>Optimal for today's recovery</p></div>
      <button class="go">Start</button>
    </div>

    <script>
      // Animate the recovery ring + count up on load.
      const target = 82, arc = document.getElementById('arc'), num = document.getElementById('num')
      const full = 540
      requestAnimationFrame(() => { arc.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(.2,.8,.2,1)'; arc.style.strokeDashoffset = full - (full * target / 100) })
      let n = 0; const t = setInterval(() => { n += 2; if (n >= target) { n = target; clearInterval(t) } num.textContent = n }, 28)
      // Strain bars
      const heights = [40, 65, 30, 80, 55, 70, 48]
      document.getElementById('bars').innerHTML = heights.map(h => `<i style="height:${h}%"></i>`).join('')
      // Live HRV flicker
      const hrv = document.getElementById('hrv')
      setInterval(() => { const v = 66 + Math.round(Math.random() * 5); hrv.innerHTML = v + '<small> ms</small>' }, 2400)
    </script>
  </body>
</html>
