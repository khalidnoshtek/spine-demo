<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=390, initial-scale=1, viewport-fit=cover" />
    <title>Spine 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { width: 390px; height: 844px; overflow: hidden; }
      body {
        font-family: 'Sora', system-ui, sans-serif;
        background: radial-gradient(120% 80% at 50% 6%, #0a2a52 0%, #061b3a 36%, #020c1e 64%, #00040d 100%);
        color: #eaf2ff; user-select: none;
      }
      #c { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
      .top { position: absolute; top: 52px; left: 0; right: 0; z-index: 5; text-align: center; pointer-events: none; }
      .top .eyebrow { font-size: 11px; letter-spacing: 3px; color: #5fd0ff; text-transform: uppercase; font-weight: 600; }
      .top h1 { font-size: 22px; font-weight: 600; margin-top: 4px; }
      .top p { font-size: 12px; color: #8fb0d8; margin-top: 3px; }

      .panel { position: absolute; left: 14px; right: 14px; bottom: 22px; z-index: 6;
        background: rgba(8,20,40,.62); border: 1px solid rgba(120,180,255,.16); border-radius: 20px;
        padding: 14px 15px 15px; backdrop-filter: blur(10px); }

      /* severity readout */
      .sev { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .sev .lbl { font-size: 10.5px; letter-spacing: 1.2px; color: #88a8d0; text-transform: uppercase; }
      .sev .val { font-size: 14px; font-weight: 700; letter-spacing: .5px; }
      .sev .meter { height: 6px; border-radius: 99px; background: rgba(255,255,255,.08); margin-top: 8px; overflow: hidden; }
      .sev .meter i { display: block; height: 100%; width: 20%; border-radius: 99px; transition: width .45s ease, background .45s ease; }

      /* pain slider */
      .pain { margin: 13px 0 14px; }
      .pain .head { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #9fc0e8; letter-spacing: .4px; margin-bottom: 8px; }
      .pain .head b { color: #ff6b6b; font-weight: 700; font-size: 13px; }
      input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 99px; outline: none;
        background: linear-gradient(90deg, #f87171 var(--p,0%), rgba(255,255,255,.1) var(--p,0%)); }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
        background: #fff; box-shadow: 0 0 10px rgba(248,113,113,.8); cursor: pointer; }

      /* posture selector */
      .dock { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
      .dock button { border: 1px solid rgba(120,180,255,.18); background: rgba(10,26,50,.55); color: #bcd6f5;
        border-radius: 13px; padding: 9px 2px 7px; font-family: inherit; font-size: 11px; font-weight: 500;
        display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all .18s; }
      .dock button .ic { font-size: 17px; line-height: 1; }
      .dock button:active { transform: scale(.95); }
      .dock button.on { border-color: #38bdf8; background: linear-gradient(180deg, rgba(56,189,248,.24), rgba(56,189,248,.05)); color: #fff; box-shadow: 0 0 20px -6px rgba(56,189,248,.6); }

      .hint { position: absolute; left: 0; right: 0; bottom: 200px; z-index: 4; text-align: center; font-size: 10px; color: #5f82ac; letter-spacing: .3px; pointer-events: none; }
      .fallback { position: absolute; inset: 0; display: none; place-items: center; text-align: center; padding: 40px; color: #9fc0e8; z-index: 9; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <div class="top">
      <div class="eyebrow">Spine Lab · 3D</div>
      <h1 id="poseTitle">Standing</h1>
      <p id="poseDesc">Neutral alignment · healthy curves</p>
    </div>

    <div class="hint">Drag to rotate the spine</div>

    <div class="panel">
      <div class="sev">
        <div>
          <div class="lbl">Spine load · severity</div>
          <div class="meter"><i id="sevBar" style="width:20%;background:#34d399"></i></div>
        </div>
        <div class="val" id="sevVal" style="color:#34d399">LOW</div>
      </div>

      <div class="pain">
        <div class="head"><span>PAIN INTENSITY</span><b id="painVal">0 / 10</b></div>
        <input id="pain" type="range" min="0" max="10" value="0" step="1" />
      </div>

      <div class="dock" id="dock">
        <button data-pose="standing" class="on"><span class="ic">🧍</span>Stand</button>
        <button data-pose="walking"><span class="ic">🚶</span>Walk</button>
        <button data-pose="sitting"><span class="ic">🪑</span>Sit</button>
        <button data-pose="lifting"><span class="ic">🏋️</span>Lift</button>
      </div>
    </div>

    <div class="fallback" id="fallback">3D needs WebGL — try a modern browser.</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from 'three'
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

      const canvas = document.getElementById('c')
      let renderer
      try {
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true })
      } catch (e) {
        document.getElementById('fallback').style.display = 'grid'
        throw e
      }
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2))

      const scene = new THREE.Scene()
      const DIST = 16
      const camera = new THREE.PerspectiveCamera(32, 390 / 844, 0.1, 100)
      camera.position.set(0, 0, DIST)

      const controls = new OrbitControls(camera, canvas)
      controls.enableDamping = true
      controls.dampingFactor = 0.08
      controls.enablePan = false
      controls.enableZoom = false
      controls.target.set(0, 0, 0)
      controls.minPolarAngle = Math.PI * 0.32
      controls.maxPolarAngle = Math.PI * 0.68
      let idle = true
      canvas.addEventListener('pointerdown', () => (idle = false))

      // lighting
      scene.add(new THREE.AmbientLight(0x90b0ff, 0.6))
      const key = new THREE.DirectionalLight(0xcfe6ff, 1.3); key.position.set(4, 9, 9); scene.add(key)
      const rim = new THREE.PointLight(0x3ea0ff, 40, 50); rim.position.set(-7, 3, -5); scene.add(rim)
      const warm = new THREE.PointLight(0xffc060, 22, 34); warm.position.set(4, -2, 7); scene.add(warm)

      // rig (pivot at origin) → spine
      const rig = new THREE.Group(); scene.add(rig)
      const spine = new THREE.Group(); rig.add(spine)

      const N = 24 // sacrum(0) → skull base(N-1)
      const BONE = new THREE.Color(0xeaeee8)
      const RED = new THREE.Color(0xff3326)

      // one anatomically-suggestive vertebra: body + disc + spinous + 2 transverse processes
      function makeVertebra() {
        const g = new THREE.Group()
        const mat = new THREE.MeshStandardMaterial({ color: BONE.clone(), emissive: new THREE.Color(0x16486e), emissiveIntensity: 0.4, roughness: 0.45, metalness: 0.05 })
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.26, 18), mat)
        body.scale.z = 0.85
        g.add(body)
        const disc = new THREE.Mesh(
          new THREE.CylinderGeometry(0.34, 0.34, 0.1, 18),
          new THREE.MeshStandardMaterial({ color: 0x4a86c8, emissive: 0x1d4e86, emissiveIntensity: 0.5, transparent: true, opacity: 0.55, roughness: 0.3 }),
        )
        disc.position.y = 0.18
        g.add(disc)
        const spinous = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.62, 8), mat)
        spinous.rotation.x = -Math.PI / 2.1
        spinous.position.set(0, -0.02, -0.52)
        g.add(spinous)
        for (const sx of [-1, 1]) {
          const tp = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.05, 0.4, 6), mat)
          tp.rotation.z = Math.PI / 2
          tp.position.set(sx * 0.42, 0, -0.12)
          g.add(tp)
        }
        g.userData.mats = [mat] // body+spinous+transverse share `mat`; disc excluded from pain tint
        return g
      }

      const verts = []
      for (let i = 0; i < N; i++) { const v = makeVertebra(); verts.push(v); spine.add(v) }

      // red pain halo at the epicentre
      const haloTex = (() => {
        const cv = document.createElement('canvas'); cv.width = cv.height = 128
        const ctx = cv.getContext('2d'); const grd = ctx.createRadialGradient(64, 64, 0, 64, 64, 64)
        grd.addColorStop(0, 'rgba(255,60,40,0.9)'); grd.addColorStop(0.4, 'rgba(255,60,40,0.35)'); grd.addColorStop(1, 'rgba(255,60,40,0)')
        ctx.fillStyle = grd; ctx.fillRect(0, 0, 128, 128); return new THREE.CanvasTexture(cv)
      })()
      const halo = new THREE.Sprite(new THREE.SpriteMaterial({ map: haloTex, transparent: true, opacity: 0, depthWrite: false, blending: THREE.AdditiveBlending }))
      halo.scale.setScalar(3)
      spine.add(halo)

      // postures (control points sacrum→skull, z+ = anterior). load = lumbar load 0..1
      const POSES = {
        standing: { title: 'Standing', desc: 'Neutral alignment · healthy curves', load: 0.2,
          pts: [[0,0,-0.2],[0,1.6,0.55],[0,3.3,0.05],[0,5.1,-0.55],[0,6.9,-0.1],[0,8.3,0.45],[0,9.1,0.5]] },
        walking: { title: 'Walking', desc: 'Curves load rhythmically with each step', load: 0.34,
          pts: [[0,0,-0.2],[0,1.6,0.5],[0,3.3,0.05],[0,5.1,-0.5],[0,6.9,-0.05],[0,8.3,0.5],[0,9.1,0.55]] },
        sitting: { title: 'Sitting', desc: 'Lumbar curve flattens · disc pressure rises', load: 0.62,
          pts: [[0,0,-0.35],[0,1.5,-0.05],[0,3.0,-0.35],[0,4.6,-0.7],[0,6.0,-0.45],[0,7.2,0.15],[0,7.9,0.55]] },
        lifting: { title: 'Lifting', desc: 'Rounded flexion · peak load at L4–L5', load: 0.95,
          pts: [[0,0,-0.3],[0,1.4,-0.15],[0,2.7,0.5],[0,3.5,1.6],[0,3.95,2.9],[0,4.05,4.2],[0,3.95,5.2]] },
      }

      let current = POSES.standing.pts.map((p) => p.slice())
      let target = POSES.standing.pts.map((p) => p.slice())
      let activePose = 'standing'
      let pain = 0 // 0..1
      const PAIN_T = 0.22 // lumbar epicentre

      const up = new THREE.Vector3(0, 1, 0)
      function buildCurve() {
        return new THREE.CatmullRomCurve3(current.map((p) => new THREE.Vector3(p[0], p[1], p[2])), false, 'catmullrom', 0.5)
      }
      function layout() {
        const curve = buildCurve()
        let haloPos = null
        for (let i = 0; i < N; i++) {
          const t = i / (N - 1)
          const pos = curve.getPoint(t)
          const tan = curve.getTangent(t).normalize()
          verts[i].position.copy(pos)
          verts[i].quaternion.setFromUnitVectors(up, tan)
          const s = THREE.MathUtils.lerp(0.66, 0.32, t) * (1 + 0.1 * Math.sin(t * Math.PI))
          verts[i].scale.set(s, s, s)
          // pain redness — gaussian around epicentre, widening with intensity
          const sigma = 0.07 + 0.1 * pain
          const red = pain * Math.exp(-((t - PAIN_T) ** 2) / (2 * sigma * sigma))
          const col = BONE.clone().lerp(RED, Math.min(1, red * 1.25))
          const m = verts[i].userData.mats[0]
          m.color.copy(col)
          m.emissive.copy(new THREE.Color(0x16486e)).lerp(RED, Math.min(1, red))
          m.emissiveIntensity = 0.4 + red * 1.6
          if (Math.abs(t - PAIN_T) < 0.03) haloPos = pos
        }
        if (haloPos) halo.position.copy(haloPos)
      }
      layout()

      // fit the (tallest) standing spine into ~60% of the view, centred
      {
        const box = new THREE.Box3().setFromObject(spine)
        const h = box.max.y - box.min.y
        const viewH = 2 * DIST * Math.tan((camera.fov * Math.PI) / 360)
        rig.scale.setScalar((0.62 * viewH) / h)
      }

      // ambient particles
      const pGeo = new THREE.BufferGeometry()
      const pArr = new Float32Array(80 * 3)
      for (let i = 0; i < 80; i++) { pArr[i*3]=(Math.random()-0.5)*14; pArr[i*3+1]=(Math.random()-0.5)*12; pArr[i*3+2]=(Math.random()-0.5)*10-1 }
      pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3))
      scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x6fb6ff, size: 0.05, transparent: true, opacity: 0.5, depthWrite: false })))

      // ── UI ──
      const dock = document.getElementById('dock')
      const poseTitle = document.getElementById('poseTitle')
      const poseDesc = document.getElementById('poseDesc')
      const sevVal = document.getElementById('sevVal')
      const sevBar = document.getElementById('sevBar')
      const painEl = document.getElementById('pain')
      const painVal = document.getElementById('painVal')

      function severity() {
        // Spine Severity (SSS-flavoured): posture load + reported pain
        const s = Math.min(1, 0.5 * POSES[activePose].load + 0.7 * pain)
        let label = 'LOW', color = '#34d399'
        if (s >= 0.7) { label = 'HIGH'; color = '#f87171' }
        else if (s >= 0.42) { label = 'MODERATE'; color = '#fbbf24' }
        sevVal.textContent = label; sevVal.style.color = color
        sevBar.style.width = Math.round(20 + s * 80) + '%'; sevBar.style.background = color
      }
      function setPose(name) {
        const P = POSES[name]; if (!P) return
        activePose = name; target = P.pts.map((p) => p.slice())
        poseTitle.textContent = P.title; poseDesc.textContent = P.desc
        ;[...dock.children].forEach((b) => b.classList.toggle('on', b.dataset.pose === name))
        severity()
      }
      dock.addEventListener('click', (e) => { const b = e.target.closest('button'); if (b) setPose(b.dataset.pose) })
      painEl.addEventListener('input', () => {
        pain = +painEl.value / 10
        painVal.textContent = painEl.value + ' / 10'
        painEl.style.setProperty('--p', painEl.value * 10 + '%')
        severity()
      })

      // ── animate ──
      const clock = new THREE.Clock()
      function tick() {
        const dt = Math.min(clock.getDelta(), 0.05); const t = clock.elapsedTime
        let moving = false
        for (let i = 0; i < current.length; i++)
          for (let j = 0; j < 3; j++) {
            const d = target[i][j] - current[i][j]
            if (Math.abs(d) > 0.0008) { current[i][j] += d * Math.min(1, dt * 4.5); moving = true }
          }
        layout()
        // center vertebrae on the rig pivot
        let cx = 0, cy = 0, cz = 0
        for (const p of current) { cx += p[0]; cy += p[1]; cz += p[2] }
        const n = current.length
        spine.position.set(-cx / n, -cy / n, -cz / n)
        // idle: gentle oscillation around a 3/4 view (never edge-on)
        if (idle) rig.rotation.y = 0.22 + Math.sin(t * 0.4) * 0.32
        rig.rotation.z = activePose === 'walking' ? Math.sin(t * 2.4) * 0.05 : rig.rotation.z + (0 - rig.rotation.z) * Math.min(1, dt * 4)
        // pulsing pain halo
        halo.material.opacity = pain * (0.5 + 0.25 * Math.sin(t * 3))
        halo.scale.setScalar((2.2 + pain * 2.4) * (1 + 0.06 * Math.sin(t * 3)))
        controls.update()
        renderer.render(scene, camera)
        requestAnimationFrame(tick)
      }
      tick()
      severity()

      function resize() { const w = innerWidth, h = innerHeight; renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix() }
      addEventListener('resize', resize); resize()
    </script>
  </body>
</html>
