<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Spine Quest — Laser Spine</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app.css" />

<style>
  html, body { margin: 0; height: 100%; background: transparent; }
  body {
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
  }
  #stage {
    position: relative;
    transform-origin: center center;
  }
  #root { width: 402px; height: 874px; position: relative; }
</style>
</head>
<body>
  <div id="stage">
    <div id="root"></div>
  </div>

  <!-- thumbnail used by the offline bundler -->
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="22" fill="#15123a"/>
      <circle cx="50" cy="44" r="22" fill="none" stroke="#7C83FF" stroke-width="7"/>
      <circle cx="50" cy="44" r="22" fill="none" stroke="#34E0C4" stroke-width="7" stroke-dasharray="104 138" stroke-linecap="round" transform="rotate(-90 50 44)"/>
      <circle cx="50" cy="78" r="7" fill="#FBBF24"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="mascot.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="screens-dashboard.jsx"></script>
  <script type="text/babel" src="screens-track.jsx"></script>
  <script type="text/babel" src="screens-levels.jsx"></script>
  <script type="text/babel" src="screens-rewards.jsx"></script>
  <script type="text/babel" src="screens-assessment.jsx"></script>
  <script type="text/babel" src="screens-wearables.jsx"></script>
  <script type="text/babel" src="screens-onboarding.jsx"></script>
  <script type="text/babel" src="sheets.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const DEV_W = 402, DEV_H = 874;

    // ── tweaks stubs ──────────────────────────────────────────────────────────
    // The interactive tweaks panel is removed for the embedded dashboard build.
    // Provide a no-op useTweaks (values fixed to defaults) and render-nothing
    // Tweak* components so the app code that references them still works without
    // surfacing any controls panel.
    function useTweaks(defaults) {
      const [values] = React.useState(defaults);
      const setTweak = React.useCallback(() => {}, []);
      return [values, setTweak];
    }
    const __TweakNoop = () => null;
    Object.assign(window, {
      useTweaks,
      TweaksPanel: __TweakNoop, TweakSection: __TweakNoop, TweakRow: __TweakNoop,
      TweakSlider: __TweakNoop, TweakToggle: __TweakNoop, TweakRadio: __TweakNoop,
      TweakSelect: __TweakNoop, TweakText: __TweakNoop, TweakNumber: __TweakNoop,
      TweakColor: __TweakNoop, TweakButton: __TweakNoop,
    });

    function Root() {
      const [dark, setDark] = React.useState(true);
      React.useEffect(() => { window.__setDeviceTheme = setDark; }, []);
      return (<div style={{ position:"absolute", inset:0, overflow:"hidden", borderRadius:45, background:"#000" }}><App /></div>);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

    // scale device to fill viewport
    function fit() {
      const s = Math.min(window.innerWidth / DEV_W, window.innerHeight / DEV_H);
      document.getElementById("stage").style.transform = `scale(${s})`;
    }
    window.addEventListener("resize", fit);
    fit();
    setTimeout(fit, 300);
  </script>
</body>
</html>
